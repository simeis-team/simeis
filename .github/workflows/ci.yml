name: Simeis CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  # --- PARTIE DÉVELOPPEMENT (PR et autres branches) ---
  # Ces jobs s'exécutent pour satisfaire tes règles de protection
  
  lint:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Développement - Check
        run: make check

  test:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Développement - Tests unitaires
        run: make test

  build_dev:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Développement - Build simple
        run: make build

  # --- PARTIE PRODUCTION (Merge dans main) ---
  # Ce job s'exécute uniquement quand le code arrive sur main
  
  release_and_doc:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Typst (Direct Download)
        run: |
          # Télécharge le binaire pour Linux x86_64
          wget https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz
          tar -xvf typst-x86_64-unknown-linux-musl.tar.xz
          # Déplace le binaire dans le PATH pour que 'make doc' le trouve
          sudo cp typst-x86_64-unknown-linux-musl/typst /usr/local/bin/

      - name: Compilation Release
        run: make release

      - name: Compilation Documentation
        run: make doc