name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  tests:
    runs-on: nix
    steps:
      - uses: actions/checkout@v4

      - name: Calculate lockfile hash
        id: cargo-lock-hash
        run: echo "hash=$(md5sum Cargo.lock)" >> $GITHUB_OUTPUT

      - uses: https://code.forgejo.org/actions/cache@v4
        name: Cache dependencies
        id: cache-rust
        with:
          path: |
            .cargohome/registry/index/
            .cargohome/registry/cache/
            .cargohome/git/db/
            target/
            supply-chain/
          key: ${{ runner.os }}-tests-${{ steps.cargo-lock-hash.outputs.hash }}

      - name: "Unit tests"
        run: nix run .#unit_tests --show-trace -L

      - name: "Functional tests"
        run: nix run .#functional_tests --show-trace -L

  code-check:
    runs-on: nix
    steps:
      - uses: actions/checkout@v4

      - name: Calculate lockfile hash
        id: cargo-lock-hash
        run: echo "hash=$(md5sum Cargo.lock)" >> $GITHUB_OUTPUT

      - uses: https://code.forgejo.org/actions/cache@v4
        name: Cache dependencies
        id: cache-rust
        with:
          path: |
            .cargohome/registry/index/
            .cargohome/registry/cache/
            .cargohome/git/db/
            target/
            supply-chain/
          key: ${{ runner.os }}-check-${{ steps.cargo-lock-hash.outputs.hash }}

      - name: "Check the sanity of the Rust code"
        run: nix run .#check_rust_code

  todo-check:
    runs-on: nix
    steps:
      - uses: actions/checkout@v4
      - name: "Check for unadressed TODOs"
        run: nix run .#check_todos

  # TODO Workflow to test if the robots can still play for X minutes without losing
  #   Or getting a timeout because of a deadlock
  #   Compile the server with a "extraspeed" feature to make it quicker
  #   Make X players play together
  # robots-viable:
